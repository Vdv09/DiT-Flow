experiment:
  name: cfg_ablation
  device: cuda
  seed: 42

data:
  dataset: cifar10
  batch_size: 256
  num_workers: 4

model:
  type: unet
  params:
    in_channels: 3
    start_channels: 32
    num_blocks: 4
    embedding_dim: 256
    num_classes: 10
    num_blocks_with_attention: 2
  ema:
    beta: 0.9999

diffusion:
  method: ddpm
  schedule: cosine
  number_steps: 1000

sampling:
  checkpoint: ./results/ddpm_cifar10_cfg/models/epoch_999.pth
  scales: [0, 1, 2, 3, 5, 10]
  per_class: 8
  output_dir: ./results/cfg_ablation